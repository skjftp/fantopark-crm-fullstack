name: Deploy Development

on:
  push:
    branches: [ development ]
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout development branch
      uses: actions/checkout@v3
      with:
        ref: development
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Prepare development frontend
      run: |
        cd frontend/public
        
        # Update API URL for development backend
        sed -i 's|https://fantopark-backend-150582227311.us-central1.run.app|https://fantopark-backend-dev-150582227311.us-central1.run.app|g' index.html
        
        # Add development environment indicators
        sed -i 's|<title>FanToPark CRM</title>|<title>FanToPark CRM - DEVELOPMENT</title>|g' index.html
        
        # Add development banner
        sed -i 's|<body>|<body><div style="background:#ff6b35;color:white;text-align:center;padding:8px;font-weight:bold;font-size:14px;">🚧 DEVELOPMENT ENVIRONMENT 🚧</div>|g' index.html
        
        # Add development identifier in console
        sed -i 's|console.log("FanToPark CRM loaded");|console.log("FanToPark CRM - DEVELOPMENT loaded");|g' index.html
    
    - name: Deploy to GitHub Pages (dev path)
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./frontend/public
        destination_dir: dev
        keep_files: false
